<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart Landing</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Consolas, monospace;
}

body{
background:#050505;
overflow:hidden;
color:white;
}

#inicio{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:#050505;
z-index:10;
}

.system{
color:#ff3b5c;
font-size:14px;
margin-bottom:20px;
}

h1{
font-size:80px;
font-weight:bold;
margin-bottom:15px;
}

.sub{
color:#aaa;
margin-bottom:25px;
font-style:italic;
}

button{
padding:16px 35px;
background:#ff2d55;
border:none;
border-radius:10px;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 25px #ff2d55;
}

#heartCanvas{
display:none;
background:black;
}

</style>

</head>
<body>

<div id="inicio">

<div class="system">
[SYSTEM] Initializing heart.PROTOCOL_v2.0...
</div>

<h1>TE AMO EVELYN.</h1>

<div class="sub">
> Un paquete de amor fue encontrado para ti.
</div>

<button onclick="mostrarCorazon()">
❤️ Pícale para demostrarte mi amor
</button>

</div>

<canvas id="heartCanvas"></canvas>

<script>

function mostrarCorazon(){

document.getElementById("inicio").style.display="none";

const canvas=document.getElementById("heartCanvas");
canvas.style.display="block";

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const puntos=[];

for(let t=0;t<Math.PI*2;t+=0.0015){

const bordeX=
16*Math.pow(Math.sin(t),3);

const bordeY=
-(13*Math.cos(t)
-5*Math.cos(2*t)
-2*Math.cos(3*t)
-Math.cos(4*t));

for(let r=0;r<35;r++){

const factor=Math.random();

puntos.push({

x:bordeX*factor,
y:bordeY*factor

});

}

}

for(let i=puntos.length-1;i>0;i--){

const j=Math.floor(Math.random()*i);

[puntos[i],puntos[j]]=
[puntos[j],puntos[i]];

}

let index=0;

ctx.fillStyle="#ff1744";

function dibujar(){

for(let i=0;i<10;i++){

if(index>=puntos.length){
return;
}

const p=puntos[index];

const x=
canvas.width/2+
p.x*28;

const y=
canvas.height/2+
p.y*28;

ctx.shadowColor="#ff1744";
ctx.shadowBlur=20;

ctx.fillStyle="#ff1744";

ctx.font="14px Consolas";

ctx.fillText(
"te amo evelyn",
x,
y
);

index++;

}

requestAnimationFrame(dibujar);

}

dibujar();

}

</script>

</body>
</html>
